      }
      /* Custom Micro-Interactions */
      .btn-beam {
        position: relative;
        z-index: 1;
        overflow: hidden;
      }
      .btn-beam::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(90deg, #bef264, #10b981, #bef264);
        background-size: 200% 100%;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s;
        border-radius: inherit;
        animation: borderBeam 2s linear infinite;
      }
      .btn-beam:hover::before {
        opacity: 1;
      }

        opacity: 1;
